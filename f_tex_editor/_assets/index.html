<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>f_tex_editor</title>
<link rel="stylesheet"
      href="https://unpkg.com/monaco-editor@0.45.0/min/vs/editor/editor.main.css">
<style>
html, body { margin: 0; height: 100%; overflow: hidden;
             font-family: system-ui, sans-serif;
             background: #1e1e1e; color: #ddd; }
#app { display: grid;
       grid-template-columns: var(--left, 1fr) 6px 1fr;
       grid-template-rows: 44px 1fr 36px;
       height: 100vh; }
#toolbar { grid-column: 1 / 4;
           display: flex; align-items: center; gap: 12px;
           padding: 0 14px;
           background: #252526;
           border-bottom: 1px solid #333; }
#toolbar button { background: #0e639c; color: white;
                  border: none; padding: 6px 14px;
                  cursor: pointer; border-radius: 3px;
                  font-size: 13px; }
#toolbar button:hover { background: #1177bb; }
#toolbar button:disabled { background: #555; cursor: wait; }
#toolbar .path { flex: 1; font-family: Consolas, monospace;
                 font-size: 12px; color: #999;
                 white-space: nowrap; overflow: hidden;
                 text-overflow: ellipsis; }
#editor { min-width: 0; }
#splitter { background: #333; cursor: col-resize;
            transition: background 0.15s; user-select: none; }
#splitter:hover, #app.dragging #splitter { background: #0e639c; }
#app.dragging { cursor: col-resize; }
#app.dragging #editor,
#app.dragging #preview iframe { pointer-events: none; }
#preview { background: #525659; position: relative;
           min-width: 0; }
#preview iframe { width: 100%; height: 100%; border: none;
                  background: #525659; }
#preview .empty { position: absolute; inset: 0;
                  display: flex; align-items: center;
                  justify-content: center;
                  color: #aaa; font-size: 13px; }
#status { grid-column: 1 / 4;
          padding: 8px 14px;
          background: #007acc;
          font-family: Consolas, monospace;
          font-size: 12px;
          overflow-x: auto; white-space: nowrap;
          color: #fff; }
#status.error { background: #a1260d; }
#status.idle  { background: #252526; color: #888; }
</style>
</head>
<body>
<div id="app">
  <div id="toolbar">
    <button id="save-btn">Save and Compile (Ctrl+S)</button>
    <span class="path" id="path-label"></span>
  </div>
  <div id="editor"></div>
  <div id="splitter" title="Drag to resize"></div>
  <div id="preview">
    <div class="empty" id="empty-msg">No PDF yet. Press Ctrl+S to compile.</div>
    <iframe id="pdf-frame" style="display:none"></iframe>
  </div>
  <div id="status" class="idle">Loading editor...</div>
</div>

<script src="https://unpkg.com/monaco-editor@0.45.0/min/vs/loader.js"></script>
<script>
(function() {
  const params = new URLSearchParams(window.location.search);
  const drivePath = params.get('drive');
  const fileId    = params.get('fileId');
  const localPath = params.get('path') || '__DEFAULT_PATH__';
  const isDrive   = Boolean(drivePath) || Boolean(fileId);
  // When opened by fileId, drivePath is empty until /drive/open
  // resolves it on the server. Until then the label shows the id.
  let resolvedDrivePath = drivePath || '';
  const initialRef = drivePath
    ? drivePath
    : (fileId ? ('#' + fileId) : localPath);
  document.getElementById('path-label').textContent =
      (isDrive ? 'Drive: ' : '') + initialRef;

  const statusEl = document.getElementById('status');
  const saveBtn  = document.getElementById('save-btn');
  const frame    = document.getElementById('pdf-frame');
  const empty    = document.getElementById('empty-msg');
  const app      = document.getElementById('app');
  const splitter = document.getElementById('splitter');

  // Restore saved split position
  const SPLIT_KEY = 'texEditor.splitLeft';
  const MIN_PANE = 200;
  const saved = localStorage.getItem(SPLIT_KEY);
  if (saved) app.style.setProperty('--left', saved);

  splitter.addEventListener('mousedown', e => {
    e.preventDefault();
    app.classList.add('dragging');
    let lastLeft = null;
    const onMove = ev => {
      const w = Math.max(MIN_PANE,
                Math.min(window.innerWidth - MIN_PANE - 6,
                         ev.clientX));
      lastLeft = w + 'px';
      app.style.setProperty('--left', lastLeft);
    };
    const onUp = () => {
      app.classList.remove('dragging');
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      if (lastLeft) localStorage.setItem(SPLIT_KEY, lastLeft);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });

  function setStatus(msg, mode) {
    statusEl.textContent = msg;
    statusEl.className = mode || '';
  }

  let editor = null;

  require.config({
    paths: { vs: 'https://unpkg.com/monaco-editor@0.45.0/min/vs' }
  });
  require(['vs/editor/editor.main'], async () => {
    let src = '';
    let openUrl;
    if (isDrive) {
      openUrl = drivePath
        ? '/drive/open?drive=' + encodeURIComponent(drivePath)
        : '/drive/open?fileId=' + encodeURIComponent(fileId);
    } else {
      openUrl = '/file?path=' + encodeURIComponent(localPath);
    }
    try {
      const res = await fetch(openUrl);
      if (res.ok) {
        const data = await res.json();
        src = data.src || '';
        // Capture the server-resolved drive path so subsequent
        // /drive/save calls use the path, not the fileId.
        if (isDrive && data.drivePath) {
          resolvedDrivePath = data.drivePath;
          document.getElementById('path-label').textContent =
              'Drive: ' + resolvedDrivePath;
        }
      }
    } catch (e) { /* keep blank */ }

    // Missing / empty file: seed a minimal compilable hello-world
    if (!src.trim()) {
      src = [
        '\\documentclass{article}',
        '\\begin{document}',
        'Hello, world.',
        '\\end{document}',
        ''
      ].join('\n');
    }

    editor = monaco.editor.create(document.getElementById('editor'), {
      value: src,
      language: 'latex',
      theme: 'vs-dark',
      automaticLayout: true,
      fontSize: 13,
      minimap: { enabled: false },
      wordWrap: 'on',
    });

    editor.addCommand(
      monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS,
      save
    );
    setStatus('Ready. Ctrl+S to save and compile.', 'idle');
  });

  async function save() {
    if (!editor) return;
    saveBtn.disabled = true;
    setStatus('Compiling...', '');
    const saveUrl = isDrive ? '/drive/save' : '/save';
    const body = isDrive
      ? { drivePath: resolvedDrivePath, src: editor.getValue() }
      : { path: localPath, src: editor.getValue() };
    try {
      const res = await fetch(saveUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (data.ok) {
        const t = new Date().toLocaleTimeString();
        const kb = (data.bytes / 1024).toFixed(1);
        let msg = 'OK - ' + kb + ' KB compiled at ' + t;
        if (isDrive) {
          msg += data.driveUploaded
            ? ' + uploaded to Drive (.tex + .pdf)'
            : ' (Drive upload failed: ' + (data.driveError || '?') + ')';
        }
        setStatus(msg, '');
        empty.style.display = 'none';
        frame.style.display = 'block';
        // Fragment hints: hide thumbnails/nav sidebar by default,
        // keep the native toolbar so the user can toggle it back
        // on via the viewer's own hamburger button.
        // navpanes=0 -> Chromium/Edge; pagemode=none -> pdf.js/Firefox.
        const pdfUrl = isDrive
          ? '/drive/pdf?drive=' + encodeURIComponent(resolvedDrivePath)
          : '/pdf?path=' + encodeURIComponent(localPath);
        frame.src = pdfUrl
                  + '&t=' + Date.now()
                  + '#toolbar=1&navpanes=0&pagemode=none';
      } else {
        setStatus(data.error || 'Compile failed.', 'error');
      }
    } catch (e) {
      setStatus('Network error: ' + e.message, 'error');
    } finally {
      saveBtn.disabled = false;
    }
  }

  saveBtn.addEventListener('click', save);
})();
</script>
</body>
</html>
