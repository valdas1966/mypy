<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>f_tex_editor</title>
<link rel="stylesheet"
      href="https://unpkg.com/monaco-editor@0.45.0/min/vs/editor/editor.main.css">
<style>
html, body { margin: 0; height: 100%; overflow: hidden;
             font-family: system-ui, sans-serif;
             background: #1e1e1e; color: #ddd; }
#app { display: grid;
       grid-template-columns: 1fr 1fr;
       grid-template-rows: 44px 1fr 36px;
       height: 100vh; }
#toolbar { grid-column: 1 / 3;
           display: flex; align-items: center; gap: 12px;
           padding: 0 14px;
           background: #252526;
           border-bottom: 1px solid #333; }
#toolbar button { background: #0e639c; color: white;
                  border: none; padding: 6px 14px;
                  cursor: pointer; border-radius: 3px;
                  font-size: 13px; }
#toolbar button:hover { background: #1177bb; }
#toolbar button:disabled { background: #555; cursor: wait; }
#toolbar .path { flex: 1; font-family: Consolas, monospace;
                 font-size: 12px; color: #999;
                 white-space: nowrap; overflow: hidden;
                 text-overflow: ellipsis; }
#editor { border-right: 1px solid #333; }
#preview { background: #525659; position: relative; }
#preview iframe { width: 100%; height: 100%; border: none;
                  background: #525659; }
#preview .empty { position: absolute; inset: 0;
                  display: flex; align-items: center;
                  justify-content: center;
                  color: #aaa; font-size: 13px; }
#status { grid-column: 1 / 3;
          padding: 8px 14px;
          background: #007acc;
          font-family: Consolas, monospace;
          font-size: 12px;
          overflow-x: auto; white-space: nowrap;
          color: #fff; }
#status.error { background: #a1260d; }
#status.idle  { background: #252526; color: #888; }
</style>
</head>
<body>
<div id="app">
  <div id="toolbar">
    <button id="save-btn">Save and Compile (Ctrl+S)</button>
    <span class="path" id="path-label"></span>
  </div>
  <div id="editor"></div>
  <div id="preview">
    <div class="empty" id="empty-msg">No PDF yet. Press Ctrl+S to compile.</div>
    <iframe id="pdf-frame" style="display:none"></iframe>
  </div>
  <div id="status" class="idle">Loading editor...</div>
</div>

<script src="https://unpkg.com/monaco-editor@0.45.0/min/vs/loader.js"></script>
<script>
(function() {
  const params = new URLSearchParams(window.location.search);
  const path = params.get('path') || '__DEFAULT_PATH__';
  document.getElementById('path-label').textContent = path;

  const statusEl = document.getElementById('status');
  const saveBtn  = document.getElementById('save-btn');
  const frame    = document.getElementById('pdf-frame');
  const empty    = document.getElementById('empty-msg');

  function setStatus(msg, mode) {
    statusEl.textContent = msg;
    statusEl.className = mode || '';
  }

  let editor = null;

  require.config({
    paths: { vs: 'https://unpkg.com/monaco-editor@0.45.0/min/vs' }
  });
  require(['vs/editor/editor.main'], async () => {
    let src = '';
    try {
      const res = await fetch('/file?path=' + encodeURIComponent(path));
      if (res.ok) src = (await res.json()).src || '';
    } catch (e) { /* keep blank */ }

    // Missing / empty file: seed a minimal compilable hello-world
    if (!src.trim()) {
      src = [
        '\\documentclass{article}',
        '\\begin{document}',
        'Hello, world.',
        '\\end{document}',
        ''
      ].join('\n');
    }

    editor = monaco.editor.create(document.getElementById('editor'), {
      value: src,
      language: 'latex',
      theme: 'vs-dark',
      automaticLayout: true,
      fontSize: 13,
      minimap: { enabled: false },
      wordWrap: 'on',
    });

    editor.addCommand(
      monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS,
      save
    );
    setStatus('Ready. Ctrl+S to save and compile.', 'idle');
  });

  async function save() {
    if (!editor) return;
    saveBtn.disabled = true;
    setStatus('Compiling...', '');
    try {
      const res = await fetch('/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ path, src: editor.getValue() }),
      });
      const data = await res.json();
      if (data.ok) {
        const t = new Date().toLocaleTimeString();
        const kb = (data.bytes / 1024).toFixed(1);
        setStatus('OK - ' + kb + ' KB compiled at ' + t, '');
        empty.style.display = 'none';
        frame.style.display = 'block';
        frame.src = '/pdf?path=' + encodeURIComponent(path)
                  + '&t=' + Date.now();
      } else {
        setStatus(data.error || 'Compile failed.', 'error');
      }
    } catch (e) {
      setStatus('Network error: ' + e.message, 'error');
    } finally {
      saveBtn.disabled = false;
    }
  }

  saveBtn.addEventListener('click', save);
})();
</script>
</body>
</html>
