<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0,
      maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Apps</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                 Roboto, "Helvetica Neue", Arial, sans-serif;
    background: linear-gradient(160deg, #FFF8E1 0%, #FFECB3 100%);
    color: #333;
    -webkit-font-smoothing: antialiased;
}

body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
}

.hub {
    width: 100%;
    max-width: 880px;
    text-align: center;
}

.hub-title {
    font-size: clamp(2rem, 6vw, 3.2rem);
    font-weight: 800;
    color: #E65100;
    letter-spacing: -0.02em;
    margin-bottom: 0.4em;
}

.hub-sub {
    font-size: clamp(1rem, 2.4vw, 1.2rem);
    color: #6D4C41;
    margin-bottom: 2em;
}

.tiles {
    display: grid;
    grid-template-columns: 1fr;
    gap: 24px;
    max-width: 720px;
    margin: 0 auto;
}

@media (min-width: 640px) {
    .tiles {
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }
}

.tile {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
    border-radius: 24px;
    text-decoration: none;
    color: #fff;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    -webkit-tap-highlight-color: transparent;
}

.tile:active {
    transform: scale(0.97);
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.18);
}

.tile-kids {
    background: linear-gradient(135deg, #42A5F5 0%, #66BB6A 100%);
}

.tile-english {
    background: linear-gradient(135deg, #FB8C00 0%, #E65100 100%);
}

.tile-skills {
    background: linear-gradient(135deg, #1e5aa0 0%, #6d3d8e 100%);
}

.tile-icon {
    font-size: clamp(3rem, 9vw, 4.2rem);
    line-height: 1;
    margin-bottom: 14px;
}

.tile-title {
    font-size: clamp(1.4rem, 3.6vw, 1.9rem);
    font-weight: 800;
    margin-bottom: 8px;
}

.tile-desc {
    font-size: clamp(0.9rem, 2.2vw, 1rem);
    opacity: 0.92;
    text-align: center;
    line-height: 1.4;
    max-width: 280px;
}

.foot {
    margin-top: 2.4em;
    font-size: 0.85rem;
    color: #8D6E63;
    opacity: 0.8;
}
</style>
</head>
<body>
<div class="hub">
    <div class="hub-title">Apps</div>
    <div class="hub-sub">Pick what you want to do</div>

    <div class="tiles">
        <a class="tile tile-kids" href="kids/index.html">
            <div class="tile-icon">&#127922;</div>
            <div class="tile-title">Kids Games</div>
            <div class="tile-desc">
                Math, patterns, board games, Hebrew letters
            </div>
        </a>
        <a class="tile tile-english" href="english/index.html">
            <div class="tile-icon">&#128218;</div>
            <div class="tile-title">Learn English</div>
            <div class="tile-desc">
                Visual lessons with Hebrew translations
            </div>
        </a>
        <a class="tile tile-skills" href="skills/index.html">
            <div class="tile-icon">&#128736;&#65039;</div>
            <div class="tile-title">Claude Skills</div>
            <div class="tile-desc">
                Quick-learn the slash skills
            </div>
        </a>
    </div>

    <div class="foot">Hosted on GitHub Pages</div>
</div>
</body>
</html>
