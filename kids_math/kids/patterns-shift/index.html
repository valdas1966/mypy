<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0,
      maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Shape Shift — Kids Math</title>
<link rel="stylesheet" href="../shared/styles.css">
<style>
/* =============================================================
   Shape Shift Game — specific styles
   ============================================================= */
.shift-area {
    flex: 1; width: 100%; max-width: 580px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: clamp(12px, 3vw, 22px); padding: 10px;
}
.shift-prompt {
    font-size: clamp(1.1rem, 3.5vw, 1.6rem);
    font-weight: 800; color: #E65100;
    text-shadow: 1px 1px 0 rgba(255,255,255,0.8);
}
body.level-4 .shift-prompt {
    color: #FFE082;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.4);
}

/* --- Sequence row --- */
.shift-sequence {
    display: flex; flex-wrap: wrap;
    justify-content: center; align-items: center;
    gap: clamp(4px, 1.2vw, 8px);
    padding: clamp(10px, 2.5vw, 16px);
    background: rgba(255,255,255,0.7);
    border-radius: 20px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
}

/* --- Sequence items --- */
.shift-item {
    width: clamp(48px, 13vw, 68px);
    height: clamp(48px, 13vw, 68px);
    display: flex; align-items: center;
    justify-content: center;
    animation: shiftPop 0.4s
               cubic-bezier(0.34, 1.56, 0.64, 1) both;
}
.shift-inner {
    display: flex; align-items: center;
    justify-content: center;
    transition: transform 0.3s;
}
.shift-inner svg {
    display: block;
    filter: drop-shadow(2px 3px 3px rgba(0,0,0,0.15));
}
@keyframes shiftPop {
    0%   { transform: scale(0) rotate(-10deg);
           opacity: 0; }
    100% { transform: scale(1) rotate(0);
           opacity: 1; }
}

/* --- Arrow between items --- */
.shift-arrow {
    font-size: clamp(1.2rem, 3.5vw, 1.8rem);
    color: #FF6F00; font-weight: 900;
    line-height: 1; opacity: 0.7;
    flex-shrink: 0;
}

/* --- Mystery cell --- */
.shift-mystery {
    border: 4px dashed #FF9800;
    border-radius: 16px;
    background: rgba(255,152,0,0.1);
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    font-weight: 900; color: #E65100;
    animation: mysteryPulse 1.5s ease-in-out infinite;
}
@keyframes mysteryPulse {
    0%, 100% { transform: scale(1);
               border-color: #FF9800; }
    50%      { transform: scale(1.08);
               border-color: #E65100; }
}
.shift-reveal {
    animation: shiftPop 0.5s
               cubic-bezier(0.34, 1.56, 0.64, 1) both;
}

/* --- Choice buttons --- */
.shift-choices {
    display: flex; flex-wrap: wrap;
    justify-content: center;
    gap: clamp(10px, 3vw, 18px);
    padding: 10px;
}
.shift-choice-btn {
    width: clamp(64px, 17vw, 88px);
    height: clamp(64px, 17vw, 88px);
    background: rgba(255,255,255,0.92);
    border: 4px solid #E0E0E0;
    border-radius: 20px;
    display: flex; align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s,
                border-color 0.15s;
    box-shadow: 0 4px 0 rgba(0,0,0,0.1),
                0 6px 12px rgba(0,0,0,0.1);
}
.shift-choice-btn:active {
    transform: translateY(3px);
    box-shadow: 0 1px 0 rgba(0,0,0,0.1);
}
.shift-choice-btn .shift-inner svg {
    display: block;
}
.shift-choice-btn.correct-flash {
    border-color: #4CAF50;
    animation: correctFlash 0.6s ease;
}
.shift-choice-btn.shake {
    animation: shake 0.4s ease;
}
</style>
</head>
<body>

<!-- ======================== Welcome ======================== -->
<div class="screen" id="welcome-screen">
    <div class="welcome-title" id="welcome-title">
        &#10024; Shape Shift
    </div>
    <div class="welcome-animals" id="welcome-animals"></div>
    <button class="play-btn" id="play-btn">Play!</button>
</div>

<!-- ======================== Game =========================== -->
<div class="screen hidden" id="game-screen">
    <div class="top-bar">
        <div class="top-bar-left">
            <a class="home-btn"
               href="../menus/patterns.html"
               title="Menu">&#127968;</a>
            <span class="stars-display"
                  id="stars-display">&#11088; 0</span>
            <span class="level-display"
                  id="level-display">Level 1</span>
        </div>
        <button class="mute-btn"
                id="mute-btn">&#128264;</button>
    </div>
    <div class="candy-bar" id="candy-bar"></div>
    <div class="game-area">
        <div class="shift-area">
            <div class="shift-prompt">
                How does it change?
            </div>
            <div class="shift-sequence"
                 id="shift-sequence"></div>
            <div class="shift-choices"
                 id="shift-choices"></div>
        </div>
    </div>
</div>

<!-- ======================== Champion ======================= -->
<div class="screen hidden" id="champion-screen">
    <div class="trophy">&#127942;</div>
    <div class="champion-title">CHAMPION!</div>
    <div class="welcome-animals"
         id="champion-animals"></div>
    <button class="play-again-btn"
            id="play-again-btn">Play Again!</button>
</div>

<!-- ======================== Feedback ======================= -->
<div class="feedback" id="feedback"></div>

<!-- ======================== Scripts ========================= -->
<script src="../shared/audio.js"></script>
<script src="../shared/animals.js"></script>
<script src="../shared/effects.js"></script>
<script src="../shared/prizes.js"></script>
<script src="../shared/ice-cream.js"></script>
<script src="../shared/dress-up.js"></script>
<script src="game.js"></script>
</body>
</html>
