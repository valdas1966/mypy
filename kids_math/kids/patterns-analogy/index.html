<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0,
      maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Pattern Detective &mdash; Kids Math</title>
<link rel="stylesheet" href="../shared/styles.css">
<style>
/* =============================================================
   Pattern Detective (Analogy) &mdash; specific styles
   ============================================================= */
.analogy-area {
    flex: 1; width: 100%; max-width: 600px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: clamp(8px, 2vw, 14px); padding: 10px;
}
.analogy-prompt {
    font-size: clamp(1.05rem, 3.5vw, 1.55rem);
    font-weight: 800; color: #E65100;
    text-shadow: 1px 1px 0 rgba(255,255,255,0.8);
    text-align: center;
}
body.level-4 .analogy-prompt {
    color: #FFE082;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.4);
}

/* --- Pair container --- */
.analogy-pair-wrap {
    width: 100%;
    display: flex; flex-direction: column;
    align-items: center;
    gap: 4px;
}
.analogy-label {
    font-size: clamp(0.75rem, 2.2vw, 0.95rem);
    font-weight: 800; letter-spacing: 1px;
    text-transform: uppercase;
    padding: 2px 10px; border-radius: 10px;
    align-self: flex-start;
    margin-left: clamp(6px, 2vw, 14px);
}
.analogy-label.example {
    background: #43A047; color: white;
}
.analogy-label.puzzle {
    background: #FB8C00; color: white;
}
.analogy-pair {
    width: 100%;
    display: flex; flex-wrap: nowrap;
    justify-content: center; align-items: center;
    gap: clamp(8px, 2.5vw, 16px);
    padding: clamp(10px, 2.5vw, 16px);
    border-radius: 18px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    box-sizing: border-box;
}
.analogy-pair.example {
    background: rgba(76,175,80,0.16);
    border: 2px solid rgba(76,175,80,0.35);
}
.analogy-pair.puzzle {
    background: rgba(255,152,0,0.16);
    border: 2px solid rgba(255,152,0,0.4);
}

/* --- Items (shapes) --- */
.analogy-item {
    width: clamp(52px, 14vw, 78px);
    height: clamp(52px, 14vw, 78px);
    display: flex; align-items: center;
    justify-content: center; flex-shrink: 0;
    animation: analogyPop 0.45s
               cubic-bezier(0.34, 1.56, 0.64, 1) both;
}
.analogy-inner {
    display: flex; align-items: center;
    justify-content: center;
    transition: transform 0.3s;
}
.analogy-inner svg {
    display: block;
    filter: drop-shadow(2px 3px 3px rgba(0,0,0,0.15));
}
@keyframes analogyPop {
    0%   { transform: scale(0) rotate(-10deg);
           opacity: 0; }
    100% { transform: scale(1) rotate(0);
           opacity: 1; }
}

/* --- Arrow between items --- */
.analogy-arrow {
    font-size: clamp(1.3rem, 4vw, 2rem);
    color: #E65100; font-weight: 900;
    line-height: 1; flex-shrink: 0;
    opacity: 0.8;
    animation: arrowWiggle 1.6s ease-in-out infinite;
}
.analogy-pair.example .analogy-arrow {
    color: #2E7D32;
}
@keyframes arrowWiggle {
    0%, 100% { transform: translateX(0); }
    50%      { transform: translateX(3px); }
}

/* --- Divider between example and puzzle --- */
.analogy-divider {
    width: 60%; max-width: 280px;
    height: 3px; border-radius: 2px;
    background: linear-gradient(90deg,
        transparent 0%,
        rgba(230,81,0,0.45) 50%,
        transparent 100%);
    margin: 2px 0;
}

/* --- Mystery cell --- */
.analogy-mystery {
    border: 4px dashed #FF9800;
    border-radius: 16px;
    background: rgba(255,152,0,0.1);
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    font-weight: 900; color: #E65100;
    animation: mysteryPulse 1.5s ease-in-out infinite;
}
@keyframes mysteryPulse {
    0%, 100% { transform: scale(1);
               border-color: #FF9800; }
    50%      { transform: scale(1.08);
               border-color: #E65100; }
}
.analogy-reveal {
    border: 4px solid #4CAF50;
    background: #E8F5E9;
    border-radius: 16px;
    animation: analogyPop 0.5s
               cubic-bezier(0.34, 1.56, 0.64, 1) both;
}

/* --- Choice buttons --- */
.analogy-choices {
    display: flex; flex-wrap: wrap;
    justify-content: center;
    gap: clamp(10px, 3vw, 16px);
    padding: 8px;
}
.analogy-choice-btn {
    width: clamp(62px, 16vw, 84px);
    height: clamp(62px, 16vw, 84px);
    background: rgba(255,255,255,0.92);
    border: 4px solid #E0E0E0;
    border-radius: 20px;
    display: flex; align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s,
                border-color 0.15s;
    box-shadow: 0 4px 0 rgba(0,0,0,0.1),
                0 6px 12px rgba(0,0,0,0.1);
}
.analogy-choice-btn:active {
    transform: translateY(3px);
    box-shadow: 0 1px 0 rgba(0,0,0,0.1);
}
.analogy-choice-btn .analogy-inner svg {
    display: block;
}
.analogy-choice-btn.correct-flash {
    border-color: #4CAF50;
    animation: correctFlash 0.6s ease;
}
.analogy-choice-btn.shake {
    animation: shake 0.4s ease;
}
</style>
</head>
<body>

<!-- ======================== Welcome ======================== -->
<div class="screen" id="welcome-screen">
    <div class="welcome-title" id="welcome-title">
        &#129513; Pattern Detective
    </div>
    <div class="welcome-animals" id="welcome-animals"></div>
    <button class="play-btn" id="play-btn">Play!</button>
</div>

<!-- ======================== Game =========================== -->
<div class="screen hidden" id="game-screen">
    <div class="top-bar">
        <div class="top-bar-left">
            <a class="home-btn"
               href="../menus/patterns.html"
               title="Menu">&#127968;</a>
            <span class="stars-display"
                  id="stars-display">&#11088; 0</span>
            <span class="level-display"
                  id="level-display">Level 1</span>
        </div>
        <button class="mute-btn"
                id="mute-btn">&#128264;</button>
    </div>
    <div class="candy-bar" id="candy-bar"></div>
    <div class="game-area">
        <div class="analogy-area">
            <div class="analogy-prompt">
                Apply the same change!
            </div>

            <div class="analogy-pair-wrap">
                <div class="analogy-label example">
                    Example
                </div>
                <div class="analogy-pair example"
                     id="analogy-example"></div>
            </div>

            <div class="analogy-divider"></div>

            <div class="analogy-pair-wrap">
                <div class="analogy-label puzzle">
                    Your Turn
                </div>
                <div class="analogy-pair puzzle"
                     id="analogy-puzzle"></div>
            </div>

            <div class="analogy-choices"
                 id="analogy-choices"></div>
        </div>
    </div>
</div>

<!-- ======================== Champion ======================= -->
<div class="screen hidden" id="champion-screen">
    <div class="trophy">&#127942;</div>
    <div class="champion-title">CHAMPION!</div>
    <div class="welcome-animals"
         id="champion-animals"></div>
    <button class="play-again-btn"
            id="play-again-btn">Play Again!</button>
</div>

<!-- ======================== Feedback ======================= -->
<div class="feedback" id="feedback"></div>

<!-- ======================== Scripts ========================= -->
<script src="../shared/audio.js"></script>
<script src="../shared/animals.js"></script>
<script src="../shared/effects.js"></script>
<script src="../shared/prizes.js"></script>
<script src="../shared/ice-cream.js"></script>
<script src="../shared/dress-up.js"></script>
<script src="game.js"></script>
</body>
</html>
