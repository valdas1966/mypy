<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0,
      maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Magic Grid — Kids Math</title>
<link rel="stylesheet" href="../shared/styles.css">
<style>
/* =============================================================
   Magic Grid Game — specific styles
   ============================================================= */
.grid-area {
    flex: 1; width: 100%; max-width: 500px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: clamp(14px, 4vw, 24px); padding: 10px;
}
.grid-prompt {
    font-size: clamp(1.2rem, 4vw, 1.8rem);
    font-weight: 800; color: #E65100;
    text-shadow: 1px 1px 0 rgba(255,255,255,0.8);
}
body.level-4 .grid-prompt {
    color: #FFE082;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.4);
}

/* --- Grid container --- */
.grid-container {
    display: grid;
    gap: clamp(6px, 2vw, 10px);
    background: rgba(255,255,255,0.7);
    border-radius: 20px;
    padding: clamp(12px, 3vw, 20px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
}
.grid-2x2 { grid-template-columns: repeat(2, auto); }
.grid-3x3 { grid-template-columns: repeat(3, auto); }

/* --- Grid cells --- */
.grid-cell {
    width: clamp(60px, 18vw, 90px);
    height: clamp(60px, 18vw, 90px);
    display: flex; align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.95);
    border-radius: 14px;
    border: 3px solid #E0E0E0;
    animation: gridPop 0.4s
               cubic-bezier(0.34, 1.56, 0.64, 1) both;
}
.grid-3x3 .grid-cell {
    width: clamp(52px, 15vw, 78px);
    height: clamp(52px, 15vw, 78px);
}
.grid-cell svg {
    width: 80%; height: 80%;
    display: block;
    filter: drop-shadow(1px 2px 2px rgba(0,0,0,0.12));
}
@keyframes gridPop {
    0%   { transform: scale(0) rotate(-10deg);
           opacity: 0; }
    100% { transform: scale(1) rotate(0);
           opacity: 1; }
}

/* --- Mystery cell --- */
.grid-mystery {
    border: 4px dashed #FF9800;
    background: rgba(255,152,0,0.1);
    font-size: clamp(1.8rem, 6vw, 2.8rem);
    font-weight: 900; color: #E65100;
    animation: mysteryPulse 1.5s ease-in-out infinite;
}
@keyframes mysteryPulse {
    0%, 100% { transform: scale(1);
               border-color: #FF9800; }
    50%      { transform: scale(1.06);
               border-color: #E65100; }
}

/* --- Reveal --- */
.grid-reveal {
    border-color: #4CAF50;
    background: #E8F5E9;
    animation: gridPop 0.5s
               cubic-bezier(0.34, 1.56, 0.64, 1) both;
}
.grid-reveal svg {
    width: 80%; height: 80%;
    display: block;
    filter: drop-shadow(1px 2px 2px rgba(0,0,0,0.12));
}

/* --- Choice buttons --- */
.grid-choices {
    display: flex; flex-wrap: wrap;
    justify-content: center;
    gap: clamp(10px, 3vw, 18px);
    padding: 10px;
}
.grid-choice-btn {
    background: rgba(255,255,255,0.92);
    border: 4px solid #E0E0E0;
    border-radius: 20px;
    padding: clamp(8px, 2vw, 14px);
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s,
                border-color 0.15s;
    box-shadow: 0 4px 0 rgba(0,0,0,0.1),
                0 6px 12px rgba(0,0,0,0.1);
}
.grid-choice-btn:active {
    transform: translateY(3px);
    box-shadow: 0 1px 0 rgba(0,0,0,0.1);
}
.grid-choice-btn svg {
    width: clamp(50px, 13vw, 72px);
    height: clamp(50px, 13vw, 72px);
    display: block;
}
.grid-choice-btn.correct-flash {
    border-color: #4CAF50;
    animation: correctFlash 0.6s ease;
}
.grid-choice-btn.shake {
    animation: shake 0.4s ease;
}
</style>
</head>
<body>

<!-- ======================== Welcome ======================== -->
<div class="screen" id="welcome-screen">
    <div class="welcome-title" id="welcome-title">
        &#128302; Magic Grid
    </div>
    <div class="welcome-animals" id="welcome-animals"></div>
    <button class="play-btn" id="play-btn">Play!</button>
</div>

<!-- ======================== Game =========================== -->
<div class="screen hidden" id="game-screen">
    <div class="top-bar">
        <div class="top-bar-left">
            <a class="home-btn"
               href="../menus/patterns.html"
               title="Menu">&#127968;</a>
            <span class="stars-display"
                  id="stars-display">&#11088; 0</span>
            <span class="level-display"
                  id="level-display">Level 1</span>
        </div>
        <button class="mute-btn"
                id="mute-btn">&#128264;</button>
    </div>
    <div class="candy-bar" id="candy-bar"></div>
    <div class="game-area">
        <div class="grid-area">
            <div class="grid-prompt">
                Find the missing piece!
            </div>
            <div class="grid-container"
                 id="grid-container"></div>
            <div class="grid-choices"
                 id="grid-choices"></div>
        </div>
    </div>
</div>

<!-- ======================== Champion ======================= -->
<div class="screen hidden" id="champion-screen">
    <div class="trophy">&#127942;</div>
    <div class="champion-title">CHAMPION!</div>
    <div class="welcome-animals"
         id="champion-animals"></div>
    <button class="play-again-btn"
            id="play-again-btn">Play Again!</button>
</div>

<!-- ======================== Feedback ======================= -->
<div class="feedback" id="feedback"></div>

<!-- ======================== Scripts ========================= -->
<script src="../shared/audio.js"></script>
<script src="../shared/animals.js"></script>
<script src="../shared/effects.js"></script>
<script src="../shared/prizes.js"></script>
<script src="../shared/ice-cream.js"></script>
<script src="../shared/dress-up.js"></script>
<script src="game.js"></script>
</body>
</html>
