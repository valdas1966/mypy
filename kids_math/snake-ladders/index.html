<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0,
      maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Snakes &amp; Ladders Math!</title>
<link rel="stylesheet" href="../shared/styles.css">
<style>
/* ===============================================================
   Snakes & Ladders — game-specific styles
   =============================================================== */
.sl-layout {
    display: flex; flex-direction: column;
    align-items: center;
    min-height: 100vh; padding: 8px;
    box-sizing: border-box;
}
.sl-top-bar {
    display: flex; justify-content: space-between;
    align-items: center; width: 100%;
    max-width: 440px; padding: 4px 8px;
    font-weight: 800; font-size: clamp(0.9rem, 3vw, 1.2rem);
}
.sl-top-bar .home-btn {
    text-decoration: none; font-size: 1.5em;
}
.sl-pos-display {
    color: #E65100; background: rgba(255,255,255,0.8);
    border-radius: 12px; padding: 2px 10px;
}
.sl-mute-btn {
    background: none; border: none;
    font-size: 1.3em; cursor: pointer;
}

/* --- Board --- */
.sl-board-wrap {
    position: relative; width: 100%;
    max-width: 440px; margin: 4px auto;
}
.sl-board {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    grid-template-rows: repeat(5, 1fr);
    gap: 3px;
    width: 100%;
    aspect-ratio: 8 / 5;
    border-radius: 12px;
    padding: 4px;
    background: rgba(255,255,255,0.35);
    box-shadow: 0 4px 18px rgba(0,0,0,0.12);
}
.sl-cell {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    border-radius: 6px;
    font-size: clamp(0.65rem, 2.4vw, 0.95rem);
    font-weight: 700;
    position: relative;
    transition: box-shadow 0.3s;
    line-height: 1.1;
    user-select: none;
}
.sl-cell-num {
    opacity: 0.7;
    font-size: 0.85em;
}
.sl-cell-icon {
    font-size: 1.2em;
    line-height: 1;
}
.sl-cell.sl-ladder {
    box-shadow: inset 0 0 0 2.5px #FFD700,
                0 0 8px rgba(255,215,0,0.4);
}
.sl-cell.sl-snake {
    box-shadow: inset 0 0 0 2.5px #FF5252,
                0 0 8px rgba(255,82,82,0.3);
}
.sl-cell.sl-finish {
    background: linear-gradient(135deg,
        #FFD700, #FFA000) !important;
    box-shadow: 0 0 12px rgba(255,215,0,0.6);
}

/* Row colors */
.sl-row-0 { background: #E1BEE7; }
.sl-row-1 { background: #FFF9C4; }
.sl-row-2 { background: #F8BBD0; }
.sl-row-3 { background: #BBDEFB; }
.sl-row-4 { background: #C8E6C9; }

/* --- Token --- */
.sl-token {
    position: absolute;
    width: clamp(28px, 8vw, 44px);
    height: clamp(28px, 8vw, 44px);
    border-radius: 50%;
    background: #FF6F00;
    border: 3px solid #FFF;
    box-shadow: 0 3px 8px rgba(0,0,0,0.3);
    display: flex; align-items: center;
    justify-content: center;
    font-size: clamp(16px, 5vw, 26px);
    z-index: 5;
    transition: left 0.5s cubic-bezier(0.34, 1.56, 0.64, 1),
                top 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none;
}
.sl-token.sl-slide {
    transition: left 0.8s ease-in-out,
                top 0.8s ease-in-out;
}

/* --- Dice --- */
.sl-dice {
    font-size: clamp(2.5rem, 10vw, 4.5rem);
    font-weight: 900;
    color: #E65100;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.1);
    min-height: 1.2em;
    text-align: center;
    animation: none;
}
.sl-dice.sl-roll {
    animation: diceRoll 0.6s ease-out;
}
@keyframes diceRoll {
    0%   { transform: scale(0.2) rotate(-180deg); opacity: 0; }
    60%  { transform: scale(1.3) rotate(10deg); opacity: 1; }
    100% { transform: scale(1) rotate(0deg); }
}

/* --- Question area --- */
.sl-question-area {
    width: 100%; max-width: 440px;
    text-align: center;
}
.sl-question-area .question-text {
    margin: 2px 0;
}
.sl-question-area .number-grid {
    margin-top: 4px;
}

/* --- Event banner --- */
.sl-event {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0);
    font-size: clamp(1.5rem, 7vw, 3rem);
    font-weight: 900; color: #FFF;
    padding: 16px 32px; border-radius: 20px;
    z-index: 20;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.2);
    animation: eventPop 1.8s ease-out forwards;
    pointer-events: none;
    white-space: nowrap;
}
.sl-event.sl-ladder-event {
    background: linear-gradient(135deg, #FFD700, #FFA000);
}
.sl-event.sl-snake-event {
    background: linear-gradient(135deg, #FF5252, #D32F2F);
}
@keyframes eventPop {
    0%   { transform: translate(-50%, -50%) scale(0) rotate(-10deg); }
    15%  { transform: translate(-50%, -50%) scale(1.2) rotate(5deg); }
    30%  { transform: translate(-50%, -50%) scale(1) rotate(0deg); }
    80%  { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
}

/* --- SVG overlay for snakes & ladders lines --- */
.sl-lines-svg {
    position: absolute; inset: 4px;
    pointer-events: none; z-index: 2;
}
</style>
</head>
<body>

<!-- ===== WELCOME ===== -->
<div id="welcome-screen" class="screen">
    <div class="welcome-title" id="welcome-title">
        Snakes &amp;<br>Ladders!
    </div>
    <div class="welcome-animals" id="welcome-animals"></div>
    <button class="play-btn" id="play-btn">PLAY!</button>
</div>

<!-- ===== GAME ===== -->
<div id="game-screen" class="screen hidden">
    <div class="sl-layout">
        <div class="sl-top-bar">
            <a class="home-btn" href="../" title="Menu">&#127968;</a>
            <span class="sl-pos-display" id="sl-pos">
                Square 0 / 40</span>
            <button class="sl-mute-btn" id="sl-mute">
                &#128264;</button>
        </div>
        <div class="sl-board-wrap" id="sl-board-wrap">
            <div class="sl-board" id="sl-board"></div>
            <svg class="sl-lines-svg" id="sl-lines"
                 viewBox="0 0 800 500"
                 preserveAspectRatio="none"></svg>
            <div class="sl-token" id="sl-token">&#128049;
            </div>
        </div>
        <div class="sl-question-area">
            <div class="sl-dice" id="sl-dice"></div>
            <div class="question-text" id="question-text">
            </div>
            <div class="number-grid" id="number-grid"></div>
        </div>
    </div>
</div>

<!-- ===== CHAMPION ===== -->
<div id="champion-screen" class="screen hidden">
    <div class="trophy">&#127942;</div>
    <div class="champion-title">YOU WIN!</div>
    <div class="welcome-animals" id="champion-animals"></div>
    <button class="play-again-btn" id="play-again-btn">
        Play Again!</button>
</div>

<!-- ===== FEEDBACK ===== -->
<div class="feedback" id="feedback"></div>

<script src="../shared/audio.js"></script>
<script src="../shared/animals.js"></script>
<script src="../shared/effects.js"></script>
<script src="../shared/ice-cream.js"></script>
<script src="../shared/dress-up.js"></script>
<script src="../shared/prizes.js"></script>
<script src="game.js"></script>
</body>
</html>
